name: MediGo CI/CD

on:
  push:
    branches: [ "main", "nest-implem" ]
  pull_request:
    branches: [ "main", "nest-implem" ]

jobs:
  server-ci:
    name: Server (NestJS) Builder & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Tests
        run: npm test
      - name: Build Application
        run: npm run build

  admin-dash-ci:
    name: Admin Dashboard (React) Builder & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin-dash
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./admin-dash/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Tests
        run: npm run test
      - name: Build Application
        run: npm run build

  driver-app-ci:
    name: Driver Application (Flutter) Builder & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./driver_application
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Run Tests
        run: flutter test
      - name: Build Android APK
        run: flutter build apk --debug
